kind = "web"
previewPath = "/"
title = "Fashion Store"
version = "1.0.0"
id = "artifacts/fashion-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25935

[services.development]
run = "pnpm --filter @workspace/fashion-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fashion-store", "run", "build" ]
publicDir = "artifacts/fashion-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25935"
BASE_PATH = "/"
